name: Bullstrap Price Tracker

on:
  schedule:
    # Run daily at 9:00 AM UTC
    - cron: '0 9 * * *'
  
  # Allow manual trigger
  workflow_dispatch:

jobs:
  track-price:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests
      
      - name: Run price tracker
        env:
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECIPIENT: nrkws@outlook.com
        run: python bullstrap_tracker.py
      
      - name: Commit & push changes
        run: |
          git config user.name "Price Tracker Bot"
          git config user.email "noreply@github.com"
          git add bullstrap_price_history.json
          git commit -m "Update price history - $(date)" || echo "No changes to commit"
          git push || echo "Nothing to push"
